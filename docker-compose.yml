services:
  mariadb:
    image: mariadb:11
    container_name: fincouple_db
    restart: unless-stopped
    environment:
      MARIADB_USER: fincouple
      MARIADB_PASSWORD: fincouple123
      MARIADB_DATABASE: fincouple
      MARIADB_ROOT_PASSWORD: root123
      TZ: America/Sao_Paulo
    ports:
      - '3306:3306'
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fincouple_api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DATABASE_URL:           mysql://fincouple:fincouple123@mariadb:3306/fincouple
      JWT_SECRET:             ${JWT_SECRET}
      FRONTEND_URL:           ${FRONTEND_URL}
      PORT:                   3001
      NODE_ENV:               production
      GOOGLE_CLIENT_ID:       ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET:   ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI:    ${GOOGLE_REDIRECT_URI:-}
      RCLONE_REMOTE:          ${RCLONE_REMOTE:-gdrive}
      RCLONE_BACKUP_FOLDER:   ${RCLONE_BACKUP_FOLDER:-fincouple-backups}
      RCLONE_TOKEN:           ${RCLONE_TOKEN:-}
    # Porta 3001 NÃO exposta publicamente — apenas via nginx na rede interna Docker.
    # Para debug local, descomente:
    # ports:
    #   - '3001:3001'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fincouple_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'

volumes:
  mariadb_data:
